<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ──────────────────────────────────────── -->
    <title>%VITE_SITE_NAME% — %VITE_SITE_DOMAIN%</title>
    <meta name="description" content="%VITE_SITE_DESCRIPTION%" />
    <meta name="author" content="%VITE_SITE_NAME%" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://%VITE_SITE_DOMAIN%/" />

    <!-- ── Open Graph (Facebook, WhatsApp, LinkedIn) ────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://%VITE_SITE_DOMAIN%/" />
    <meta property="og:title"       content="%VITE_SITE_NAME%" />
    <meta property="og:description" content="%VITE_SITE_DESCRIPTION%" />
    <meta property="og:image"       content="https://%VITE_SITE_DOMAIN%/images/poster.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="es_ES" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- ── Twitter / X Card ─────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="%VITE_SITE_NAME%" />
    <meta name="twitter:description" content="%VITE_SITE_DESCRIPTION%" />
    <meta name="twitter:image"       content="https://%VITE_SITE_DOMAIN%/images/poster.jpg" />

    <!-- ── Favicon ──────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png"     href="/favicon.png" />
    <link rel="apple-touch-icon"          href="/apple-touch-icon.png" />

    <!-- ── Fonts ────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@200;300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- ── Structured Data (JSON-LD) ────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "%VITE_SITE_NAME%",
      "url": "https://%VITE_SITE_DOMAIN%",
      "description": "%VITE_SITE_DESCRIPTION%",
      "inLanguage": ["es", "en", "hi", "fr", "pt"]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
